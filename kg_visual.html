  #legend h3 { margin: 0 0 10px; font-size: 13px; color: #A78BFA; }
  .leg-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .dot  { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .line { width: 24px; height: 3px; flex-shrink: 0; border-radius: 2px; }
  .dashed { background: repeating-linear-gradient(90deg,currentColor 0,currentColor 4px,transparent 4px,transparent 8px); }
  #controls {
    position: fixed; top: 16px; right: 16px; z-index: 999;
    background: #1A1D27CC; border: 1px solid #2D3148;
    border-radius: 10px; padding: 14px 16px; font-size: 12px; color: #CBD5E1;
    backdrop-filter: blur(6px); min-width: 200px;
  }
  #controls h3 { margin: 0 0 10px; font-size: 13px; color: #A78BFA; }
  .ctrl-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; cursor: pointer; }
  .ctrl-row input { accent-color: #7C3AED; cursor: pointer; }
  #stats {
    position: fixed; bottom: 16px; left: 16px; z-index: 999;
    background: #1A1D27CC; border: 1px solid #2D3148;
    border-radius: 8px; padding: 8px 14px; font-size: 11px; color: #64748B;
    backdrop-filter: blur(6px);
  }
</style>

<div id="legend">
  <h3>Node types</h3>
  <div class="leg-row"><div class="dot" style="background:#3B82F6"></div> Dataset</div>
  <div class="leg-row"><div class="dot" style="background:#10B981"></div> Field</div>
  <div class="leg-row"><div class="dot" style="background:#F59E0B"></div> Entity (dim value)</div>
  <h3 style="margin-top:12px">Edge types</h3>
  <div class="leg-row"><div class="line" style="background:#10B981"></div> HAS_FIELD</div>
  <div class="leg-row"><div class="line" style="background:#F59E0B"></div> HAS_VALUE</div>
  <div class="leg-row"><div class="line dashed" style="color:#EC4899;height:3px"></div> SHARES_DIMENSION</div>
  <div class="leg-row"><div class="line dashed" style="color:#8B5CF6;height:3px"></div> SHARES_CONCEPT</div>
</div>

<div id="controls">
  <h3>Filter node types</h3>
  <label class="ctrl-row"><input type="checkbox" id="chk-dataset" checked onchange="filterNodes()"> Dataset</label>
  <label class="ctrl-row"><input type="checkbox" id="chk-field"   checked onchange="filterNodes()"> Field</label>
  <label class="ctrl-row"><input type="checkbox" id="chk-entity"  checked onchange="filterNodes()"> Entity</label>
  <h3 style="margin-top:12px">Physics</h3>
  <label class="ctrl-row"><input type="checkbox" id="chk-physics" checked onchange="togglePhysics()"> Enable physics</label>
</div>

<div id="stats">MOSPI Knowledge Graph</div>

<script>
function filterNodes() {
  const showDataset = document.getElementById('chk-dataset').checked;
  const showField   = document.getElementById('chk-field').checked;
  const showEntity  = document.getElementById('chk-entity').checked;
  const allNodes = network.body.data.nodes.get();
  const updates  = allNodes.map(n => {
    const t = n.title || '';
    let visible = true;
    if (t.includes('Type: Dataset') && !showDataset) visible = false;
    if (t.includes('Type: Field')   && !showField)   visible = false;
    if (t.includes('Type: Entity')  && !showEntity)  visible = false;
    return { id: n.id, hidden: !visible };
  });
  network.body.data.nodes.update(updates);
}
function togglePhysics() {
  const on = document.getElementById('chk-physics').checked;
  network.setOptions({ physics: { enabled: on } });
}
// Update stats on click
network.on('click', function(params) {
  if (params.nodes.length > 0) {
    const node = network.body.data.nodes.get(params.nodes[0]);
    document.getElementById('stats').innerHTML =
      '<b style="color:#E2E8F0">' + node.label + '</b> — ' + (node.title||'').replace(/<br>/g,' · ').replace(/<[^>]+>/g,'');
  } else {
    document.getElementById('stats').textContent = 'MOSPI Knowledge Graph';
  }
});
</script>

</body>
</html>
